apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-deployment
spec:
  replicas: 3 # Running 3 copies ensures high availability
  strategy:
    type: RollingUpdate # Ensures zero-downtime during updates
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aceest-fitness
  template:
    metadata:
      labels:
        app: aceest-fitness
    spec:
      containers:
      - name: fitness-app
        # Use your actual Docker Hub username here
        image: your-dockerhub-username/aceest-fitness:1.14.2 # Compliant, fixed tag
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: fitness-secrets
              key: flask-secret
        resources:
          limits:
            memory: 100Mi
          requests:
            ephemeral-storage: "2Gi"
            cpu: 0.5
            memory: 100Mi
        ports:
        - containerPort: 5000
      automountServiceAccountToken: false