apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: fitness
    spec:
      containers:
      - name: aceest-app
        image: shalaka3/aceest-fitness:1.14.2
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
spec:
  type: NodePort
  selector:
    app: fitness
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000