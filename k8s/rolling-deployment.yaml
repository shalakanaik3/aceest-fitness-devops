apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: aceest-fitness
  template:
    metadata:
      labels:
        app: aceest-fitness
    spec:
      containers:
      - name: fitness-app
        image: YOUR_DOCKER_HUB_USERNAME/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30001